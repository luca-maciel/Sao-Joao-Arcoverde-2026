<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/styles/style.css">
    <script src="./assets/js/script.js" defer></script>
    <title>São João - Arcoverde</title>
</head>
<body>
    <header>
        <!-- Head com "menu suspenso" com opções de inicio, programação, localização -->
        <button class="menuBtn" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <h2 class="headTitle">São João - Arcoverde</h2>
        <nav>
            <ul class="menu hidden">
                <li><a href="./index.html">Início</a></li>
                <li><a href="./programacao.html">Programação</a></li>
                <li><a href="https://maps.app.goo.gl/v4V2ymxWU1QbPWB77">Localização</a></li>
            </ul>
        </nav>
    </header>
<br>
<br>
<br>
    <main>
        <section class="backgroundImageArea">
            <img src="./assets/imgs/fundoComEstETitulo.png" alt="backgroundImg" class="backgroundImage">
        </section>
        <br><br>
        <section class="regressiveCountArea">
                <h2 class="regressiveCountTitle">Contagem Regressiva para o São João de Arcoverde</h1>
                <!-- <br> -->
                <p class="regressiveCount"></p>
        </section>

        <section class="seeProgramation">
            <a href="./programacao.html" class="seeProgramationBtn">Ver Programação Completa</a>
        </section>

        <section class="galery">
            <h2 class="galeryTitle">Galeria</h2>
            <div class="galeryContainer">
                <button class="galeryBtn prevBtn" aria-label="Foto anterior">&lt;</button>
                <div class="galeryImages">
                    <img src="./assets/imgs/galeria1.jpg" alt="Foto 1" class="galeryImage">
                    <img src="./assets/imgs/galeria2.jpg" alt="Foto 2" class="galeryImage">
                    <img src="./assets/imgs/galeria3.jpg" alt="Foto 3" class="galeryImage">
                    <img src="./assets/imgs/galeria4.jpg" alt="Foto 4" class="galeryImage">
                    <img src="./assets/imgs/galeria5.jpg" alt="Foto 5" class="galeryImage">
                    <img src="./assets/imgs/galeria6.jpg" alt="Foto 6" class="galeryImage">
                </div>
                <button class="galeryBtn nextBtn" aria-label="Próxima foto">&gt;</button>
            </div>
        </section>

        <section class="mapArea">
            <h2 class="mapTitle">Localização</h2>
            <iframe 
                class="googleMap" 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3941.6926943689827!2d-37.047869536807184!3d-8.420156169246644!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7abc1e1e1e1e1e1d%3A0x1e1e1e1e1e1e1e1e!2sSão%20João%20-%20Arcoverde!5e0!3m2!1spt-BR!2sbr!4v1234567890" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
            <a href="https://maps.app.goo.gl/v4V2ymxWU1QbPWB77" target="_blank" class="mapsRouteBtn">
                Abrir no Google Maps
            </a>
        </section>
    </main> 

    <footer>
        <p>&copy; 2026 São João Festival. Todos os direitos reservados.</p>
    </footer>

</html>
